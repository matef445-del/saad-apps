<!doctype html><html lang="ar" dir="rtl"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>سيارات الشيخ سعد آل عوضه — سجل المركبات</title>
<style>
:root{--bg:#0b120e;--panel:#11201a;--panel2:#0f1c16;--line:#23382b;--gold:#b8921a;--gold2:#d8b441;--cream:#f3ead0;--muted:#9db3a3;--green:#7bd88f;--red:#f08a8a;--amber:#e8b84b}
*{box-sizing:border-box}
body{margin:0;background:radial-gradient(1100px 650px at 50% -8%,#13241b 0%,#0b120e 60%);color:var(--cream);font-family:'Segoe UI','Tahoma',sans-serif;padding:16px;min-height:100vh}
.wrap{max-width:1180px;margin:0 auto}
header{display:flex;align-items:center;justify-content:space-between;gap:14px;border-bottom:1px solid var(--gold);padding-bottom:14px;margin-bottom:16px;flex-wrap:wrap}
.brand{display:flex;align-items:center;gap:12px}
.crest{width:52px;height:52px;border-radius:14px;background:linear-gradient(160deg,#1a3325,#0c1c13);border:1px solid var(--gold);display:flex;align-items:center;justify-content:center}
.crest svg{width:30px;height:30px;fill:var(--gold2)}
.brand h1{margin:0;font-size:20px;font-weight:600;color:var(--cream)}
.brand p{margin:2px 0 0;font-size:12px;color:var(--muted)}
.stats{display:flex;gap:10px;flex-wrap:wrap}
.stat{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:8px 16px;text-align:center;min-width:78px}
.stat b{display:block;font-size:20px;color:var(--gold2);font-weight:700}
.stat span{font-size:11px;color:var(--muted)}
.stat.warn b{color:var(--amber)}
.toolbar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;align-items:center}
input,select{background:#11201a;color:var(--cream);border:1px solid var(--line);border-radius:9px;padding:9px 11px;font-size:13px;font-family:inherit}
input:focus,select:focus{outline:none;border-color:var(--gold)}
.toolbar .grow{flex:1;min-width:150px}
.btn{background:linear-gradient(160deg,#1a3325,#0f2016);color:var(--cream);border:1px solid var(--gold);border-radius:9px;padding:9px 14px;font-size:13px;cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;gap:6px;transition:.15s}
.btn:hover{background:linear-gradient(160deg,#224230,#132a1c)}
.btn.gold{background:linear-gradient(160deg,var(--gold),#8a6d14);color:#1a1205;border-color:var(--gold2);font-weight:700}
#alerts{margin-bottom:14px}
.alertbar{background:#2a2410;border:1px solid #6b5518;border-radius:12px;padding:10px 14px;display:flex;align-items:center;gap:10px;font-size:13px;color:var(--amber);cursor:pointer}
.alertbar b{color:var(--gold2)}
.tablewrap{border:1px solid var(--line);border-radius:14px;overflow:hidden;background:var(--panel2)}
table{width:100%;border-collapse:collapse;font-size:13px}
thead tr{background:#0a2010;color:var(--gold2)}
th{padding:11px 10px;text-align:right;font-weight:600;white-space:nowrap}
th.c,td.c{text-align:center}
tbody tr{border-top:1px solid var(--line);cursor:pointer;transition:.12s}
tbody tr:hover{background:#15281d}
td{padding:10px}
td .mono{font-family:monospace;color:var(--gold2);direction:ltr;display:inline-block}
.badge{padding:3px 10px;border-radius:20px;font-size:11.5px;white-space:nowrap;font-weight:600}
.b-ok{background:#14301c;color:var(--green)}
.b-warn{background:#3a2a10;color:var(--amber)}
.b-bad{background:#3a1616;color:var(--red)}
.muted{color:var(--muted)}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;align-items:flex-start;justify-content:center;padding:24px 14px;overflow:auto;z-index:50}
.modal-bg.open{display:flex}
.modal{background:linear-gradient(170deg,#12211a,#0d1712);border:1px solid var(--gold);border-radius:16px;max-width:820px;width:100%;padding:18px}
.modal-head{display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--line);padding-bottom:12px;margin-bottom:14px}
.modal-head h2{margin:0;font-size:18px;color:var(--cream);display:flex;align-items:center;gap:8px}
.x{background:none;border:none;color:var(--muted);font-size:24px;cursor:pointer;line-height:1}
.detail{display:flex;gap:16px;flex-wrap:wrap}
.dcol{flex:1;min-width:240px}
.drow{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--line);font-size:13px}
.drow span{color:var(--muted)}
.drow b{color:var(--cream);font-weight:600}
.formimg{width:300px;flex-shrink:0}
.formimg .lbl{font-size:12px;color:var(--muted);margin-bottom:6px}
.formimg img{width:100%;border-radius:12px;border:1px solid var(--gold);cursor:zoom-in;background:#fff}
.noimg{border:1.5px dashed var(--line);border-radius:12px;height:200px;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--muted);gap:6px}
.actions{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap}
.field{margin-bottom:10px}
.field label{display:block;font-size:12px;color:var(--muted);margin-bottom:4px}
.field input,.field select{width:100%}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.imgview{position:fixed;inset:0;background:rgba(0,0,0,.9);display:none;align-items:center;justify-content:center;z-index:70;padding:20px;cursor:zoom-out}
.imgview.open{display:flex}
.imgview img{max-width:100%;max-height:100%;border-radius:8px}
@media print{
 *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important;background:transparent!important;color:#000!important}
 body{background:#fff!important;padding:0}
 .toolbar,.x,.actions,#alerts,.stats{display:none!important}
 .tablewrap,table,th,td{border-color:#999!important}
 thead tr{background:#eee!important}
 th,td{color:#000!important}
}
@media(max-width:640px){.formimg{width:100%}.grid2{grid-template-columns:1fr}}

.al-card{background:linear-gradient(160deg,#16241c,#111c15);border:1px solid var(--gold);border-radius:14px;padding:12px 14px}
.al-head{display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--line);padding-bottom:8px;margin-bottom:6px;flex-wrap:wrap;gap:6px}
.al-head span:first-child{font-size:15px;font-weight:600;color:var(--gold2)}
.al-sub{font-size:11px;color:var(--muted)}
.al-row{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:8px 6px;border-radius:9px;cursor:pointer;flex-wrap:wrap;border-top:1px solid #1b2c22}
.al-row:hover{background:#1a2c20}
.al-car{font-size:13px;font-weight:600;color:var(--cream);min-width:150px}
.al-plate{font-family:monospace;color:var(--gold2);direction:ltr;font-size:12px}
.al-pills{display:flex;gap:6px;flex-wrap:wrap}
.pill{padding:3px 10px;border-radius:20px;font-size:11.5px;white-space:nowrap}
.pill-exp{background:#3a1616;color:#f0a0a0}
.pill-soon{background:#3a2e10;color:#e8c45b}
.al-ok{background:#12241a;border:1px solid #1f5233;color:#7bd88f;border-radius:12px;padding:10px 14px;font-size:13px;text-align:center}
.blogo{width:28px;height:28px;object-fit:contain;border-radius:6px;vertical-align:middle;margin-left:6px;background:#fff;padding:1px}.blogo.big{width:40px;height:40px;border-radius:9px;margin-left:8px}
td.cell-bad{background:#3a1616;color:#f2b0b0;font-weight:600}
td.cell-soon{background:#3a2e10;color:#eccb5f;font-weight:600}
.renewbtn{background:#1a3325;color:#d8b441;border:1px solid #b8921a;border-radius:7px;font-size:11px;padding:2px 9px;cursor:pointer;margin-right:6px;font-family:inherit}.renewbtn:hover{background:#224230}

function jdnToGreg(jd){var a=jd+32044,b=Math.floor((4*a+3)/146097),c=a-Math.floor(146097*b/4);var d=Math.floor((4*c+3)/1461),e2=c-Math.floor(1461*d/4),mm=Math.floor((5*e2+2)/153);return {d:e2-Math.floor((153*mm+2)/5)+1,m:mm+3-12*Math.floor(mm/10),y:100*b+d-4800+Math.floor(mm/10)};}
function hijriToGreg(y,mo,dy){var jd=hToJDN(y,mo,dy);var g=jdnToGreg(jd);var base=Date.UTC(g.y,g.m-1,g.d);for(var off=-2;off<=2;off++){var dt=new Date(base+off*86400000);var p=new Intl.DateTimeFormat('en-u-ca-islamic-umalqura',{year:'numeric',month:'2-digit',day:'2-digit',timeZone:'UTC'}).formatToParts(dt);var o={};for(var k=0;k<p.length;k++)o[p[k].type]=p[k].value;if(+o.year===y&&+o.month===mo&&+o.day===dy)return {y:dt.getUTCFullYear(),m:dt.getUTCMonth()+1,d:dt.getUTCDate()};}return g;}

function carAlerts(c){return carChecks(c).filter(function(x){return x.state!=='ok';}).map(function(x){return x.label+' — '+x.txt;});}
function cellCls(v){var d=daysUntil(v);if(d===null||d<0)return 'cell-bad';if(d<=WARN_DAYS)return 'cell-soon';return '';}
function statusOf(c){var ch=carChecks(c);var exp=ch.filter(function(x){return x.state==='expired'||x.state==='none';}).length;var soon=ch.filter(function(x){return x.state==='soon';}).length;if(exp)return {cls:'b-bad',t:(exp+soon>1)?(exp+soon)+' تنبيهات':'منتهية'};if(soon)return {cls:'b-warn',t:'قريب الانتهاء'};return {cls:'b-ok',t:'سليمة'};}
function shortIns(s){s=String(s||'—');if(s==='—'||!s)return '—';var map={'التعاونية':'التعاونية','الراجحي':'الراجحي','الخليجية':'الخليجية','الوطنية':'الوطنية (سنيك)','سنيك':'الوطنية (سنيك)','المتوسط والخليج':'المتوسط والخليج','ملاذ':'ملاذ','سلامة':'سلامة','اتحاد الخليج':'اتحاد الخليج','الأهلي':'الأهلي','بروج':'بروج','ساب':'ساب','والية':'والاء','الدرع':'الدرع'};for(var k in map){if(s.indexOf(k)>=0)return map[k];}return s.replace('الشركة ','').replace('شركة ','');}

function renderStats(){
 var tot=CARS.length,ok=0,soon=0,exp=0;
 CARS.forEach(function(c){var ch=carChecks(c);var e=ch.filter(function(x){return x.state==='expired'||x.state==='none';}).length;var s=ch.filter(function(x){return x.state==='soon';}).length;if(e)exp++;else if(s)soon++;else ok++;});
 g('stats').innerHTML=
  '<div class="stat"><b>'+tot+'</b><span>إجمالي المركبات</span></div>'+
  '<div class="stat"><b style="color:#7bd88f">'+ok+'</b><span>سليمة</span></div>'+
  '<div class="stat"><b style="color:#e8b84b">'+soon+'</b><span>قريبة الانتهاء</span></div>'+
  '<div class="stat"><b style="color:#f08a8a">'+exp+'</b><span>منتهية</span></div>';
}
function renderAlerts(){
 var list=[];
 CARS.forEach(function(c,i){var ch=carChecks(c).filter(function(x){return x.state!=='ok';});if(ch.length)list.push({c:c,i:i,ch:ch});});
 if(!list.length){g('alerts').innerHTML='<div class="al-ok">✓ كل المركبات سليمة — لا توجد تنبيهات تجديد قريبة</div>';return;}
 function rank(o){var m=9999;o.ch.forEach(function(x){var v=(x.state==='soon')?x.days:((x.state==='ok')?9999:(-1000-(-(x.days||0))));if(v<m)m=v;});return m;}
 list.sort(function(a,b){return rank(a)-rank(b);});
 var rows=list.map(function(o){
   var pills=o.ch.map(function(x){var cls=(x.state==='soon')?'pill-soon':'pill-exp';var ic=(x.label.indexOf('رخصة')>=0)?'📋':((x.label.indexOf('فحص')>=0)?'🔧':'🛡️');var nm=x.label.replace('السير','').replace('الدوري','').trim();return '<span class="pill '+cls+'">'+ic+' '+nm+': '+e(x.txt)+'</span>';}).join('');
   return '<div class="al-row" onclick="openDetail('+o.i+')"><div class="al-car">'+e(o.c.brand)+' '+e(o.c.model)+' <span class="al-plate">'+e(o.c.plate)+'</span></div><div class="al-pills">'+pills+'</div></div>';
 }).join('');
 g('alerts').innerHTML='<div class="al-card"><div class="al-head"><span>🔔 تنبيهات التجديد</span><span class="al-sub">تنبيه قبل انتهاء الرخصة أو الفحص أو التأمين بـ14 يوم</span></div>'+rows+'</div>';
}
function brands(){return [...new Set(CARS.map(c=>c.brand).filter(Boolean))].sort();}
function fillBrandFilter(){const cur=g('fb').value;g('fb').innerHTML='<option value="">كل الماركات</option>'+brands().map(b=>'<option '+(b===cur?'selected':'')+'>'+e(b)+'</option>').join('');}

function render(){
 fillBrandFilter();renderStats();renderAlerts();
 const q=(g('q').value||'').trim(),fb=g('fb').value,fs=g('fs').value;
 let list=CARS.map((c,i)=>({c,i})).filter(({c})=>{
  if(fb&&c.brand!==fb)return false;
  const warn=carAlerts(c).length>0;
  if(fs==='ok'&&warn)return false;if(fs==='warn'&&!warn)return false;
  if(q&&!((c.brand||'')+(c.model||'')+(c.plate||'')).includes(q))return false;
  return true;});
 g('tb').innerHTML=list.map(({c,i})=>{const st=statusOf(c);return '<tr onclick="openDetail('+i+')">'+
  '<td>'+(c.logo?'<img src="'+c.logo+'" class="blogo">':'')+'<b>'+e(c.brand)+'</b></td><td class="muted" dir="auto">'+e(c.model)+'</td>'+
  '<td class="c muted">'+e(c.year)+'</td><td class="muted">'+e(c.color)+'</td>'+
  '<td class="c"><span class="mono" dir="auto">'+e(c.plate)+'</span></td>'+
  '<td class="c '+cellCls(c.license_exp)+'">'+fd(c.license_exp)+'</td><td class="c '+cellCls(c.inspection_exp)+'">'+fd(c.inspection_exp)+'</td>'+
  '<td class="'+cellCls(c.ins_exp)+'" style="font-size:12px" title="'+e(c.ins_co||'')+'">'+e(shortIns(c.ins_co))+'</td>'+
  '</tr>';}).join('')
  ||'<tr><td colspan="8" style="text-align:center;padding:24px;color:#6f8578">لا توجد نتائج</td></tr>';
}

function renewRow(label,val,field,i){return '<div class="drow"><span>'+label+'</span><b>'+e(val||'—')+' <button class="renewbtn" onclick="renew('+i+',\''+field+'\')">🔄 تجديد</button></b></div>';}
function gregToHijri(y,m,d){var dt=new Date(Date.UTC(y,m-1,d));var p=new Intl.DateTimeFormat('en-u-ca-islamic-umalqura',{year:'numeric',month:'2-digit',day:'2-digit',timeZone:'UTC'}).formatToParts(dt);var o={};for(var k=0;k<p.length;k++)o[p[k].type]=p[k].value;return o.year+'-'+o.month+'-'+o.day;}
function addYear365(hstr){var p=hstr.split('-').map(Number);var g=hijriToGreg(p[0],p[1],p[2]);var dt=new Date(Date.UTC(g.y,g.m-1,g.d)+365*86400000);return gregToHijri(dt.getUTCFullYear(),dt.getUTCMonth()+1,dt.getUTCDate());}
function insCompanies(){var s={};CARS.forEach(function(c){if(c.ins_co&&c.ins_co!=='—')s[c.ins_co]=1;});INSCOS.forEach(function(x){s[x]=1;});return Object.keys(s);}
function renew(i,field){
 var c=CARS[i];var M={license:['license_exp','رخصة السير'],inspection:['inspection_exp','الفحص الدوري'],insurance:['ins_exp','التأمين']};
 var fld=M[field][0],nm=M[field][1];
 var cur=norm(c[fld]);var todayH=norm(TODAY);var base=(cur&&cur>todayH)?cur:todayH;var nu=addYear365(base);
 if(field==='insurance'){
   var opts=insCompanies().map(function(x){return '<option '+(x===c.ins_co?'selected':'')+'>'+e(x)+'</option>';}).join('');
   g('modalIn').innerHTML='<div class="modal-head"><h2>🔄 تجديد التأمين — '+e(c.brand)+' '+e(c.model)+'</h2><button class="x" onclick="openDetail('+i+')">×</button></div>'+
     '<div style="max-width:460px;margin:6px auto">'+
     '<div class="field"><label>اختر شركة التأمين</label><select id="rn_co">'+opts+'</select></div>'+
     '<div style="background:#12241a;border:1px solid #1f5233;border-radius:10px;padding:10px;color:#7bd88f;font-size:13px;margin-bottom:12px">التجديد لمدة سنة (365 يوم) — تاريخ الانتهاء الجديد: <b>'+fd(nu)+'</b></div>'+
     '<div class="actions"><button class="btn gold" onclick="doInsRenew('+i+',\''+nu+'\')">💾 حفظ التجديد</button><button class="btn" onclick="openDetail('+i+')">إلغاء</button></div></div>';
   return;
 }
 if(!confirm('تجديد '+nm+' لمدة سنة (365 يوم)؟\n'+c.brand+' '+c.model+'  ('+c.plate+')\nتاريخ الانتهاء الجديد: '+fd(nu)))return;
 c[fld]=nu;save();render();openDetail(i);alert('✓ تم تجديد '+nm+' لمدة سنة\nينتهي في: '+fd(nu));
}
function doInsRenew(i,nu){var c=CARS[i];var co=(g('rn_co').value||'').trim();if(co)c.ins_co=co;c.ins_exp=nu;c.ins_status='سارية';save();render();openDetail(i);alert('✓ تم تجديد التأمين لمدة سنة\nالشركة: '+c.ins_co+'\nينتهي في: '+fd(nu));}
function openDetail(i){
 const c=CARS[i];const al=carAlerts(c);
 const img=c.form?('<img src="'+c.form+'" onclick="zoom(\''+i+'\')">'):('<div class="noimg"><div style="font-size:30px">🚗</div><div>لا توجد استمارة</div></div>');
 const R=(l,v)=>'<div class="drow"><span>'+l+'</span><b>'+e(v||'—')+'</b></div>';
 g('modalIn').innerHTML=
 '<div class="modal-head"><h2>'+(c.logo?'<img src="'+c.logo+'" class="blogo big">':'🚗')+' '+e(c.brand)+' <span dir="auto">'+e(c.model)+'</span> <span class="muted" style="font-size:13px">'+e(c.year)+'</span></h2><button class="x" onclick="closeModal()">×</button></div>'+
 '<div class="detail"><div class="dcol">'+
   '<div class="drow"><span>رقم اللوحة</span><b dir="auto" style="font-family:monospace;color:#d8b441">'+e(c.plate)+'</b></div>'+
   R('اللون',c.color)+R('نوع التسجيل',c.reg)+R('رقم الهيكل',c.vin)+R('الرقم التسلسلي',c.serial)+R('الوزن',(c.weight?c.weight+' كجم':'—'))+
   R('رقم الهوية',c.hid)+renewRow('انتهاء رخصة السير',fd(c.license_exp),'license',i)+renewRow('انتهاء الفحص الدوري',fd(c.inspection_exp),'inspection',i)+
   R('شركة التأمين',c.ins_co)+R('بداية التأمين',fd(c.ins_start))+renewRow('انتهاء التأمين',fd(c.ins_exp),'insurance',i)+R('حالة التأمين',c.ins_status)+
   (al.length?'<div style="margin-top:10px;background:#2a2410;border:1px solid #6b5518;border-radius:10px;padding:10px;color:#e8b84b;font-size:12.5px">⚠ '+al.map(e).join('<br>⚠ ')+'</div>':'<div style="margin-top:10px;color:#7bd88f;font-size:13px">✓ جميع الأوراق سارية</div>')+
 '</div><div class="formimg"><div class="lbl">رخصة السير</div>'+img+
   '<div class="field" style="margin-top:8px"><label>تحديث صورة الرخصة</label><input type="file" accept="image/*" onchange="setForm('+i+',this)"></div>'+
 '</div></div>'+
 '<div class="actions"><button class="btn gold" onclick="openForm('+i+')">✎ تعديل البيانات</button>'+
   '<button class="btn" onclick="delCar('+i+')" style="border-color:#6b2020;color:#f0a">🗑 حذف</button>'+
   '<button class="btn" onclick="closeModal()">إغلاق</button></div>';
 g('modal').classList.add('open');
}
function zoom(i){g('imgviewImg').src=CARS[i].form;g('imgview').classList.add('open');}
function setForm(i,inp){const f=inp.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{CARS[i].form=ev.target.result;save();openDetail(i);render();};r.readAsDataURL(f);}
function closeModal(){g('modal').classList.remove('open');}
function delCar(i){if(!confirm('حذف '+CARS[i].brand+' '+CARS[i].model+' ('+CARS[i].plate+')؟'))return;CARS.splice(i,1);save();closeModal();render();}

const COLORS=['أبيض','أسود','فضي','رمادي','ذهبي','أزرق','أحمر','بني','أخضر'];
const REGS=['خاص','نقل خاص','أجرة','نقل عام','دراجة','دبلوماسي'];
const INSCOS=['شركة التعاونية للتأمين','شركة الراجحي للتأمين التعاوني','الشركة الخليجية العامة للتأمين التعاوني','الشركة الوطنية للتأمين التعاوني (سنيك)','شركة المتوسط والخليج للتأمين التعاوني','شركة ملاذ للتأمين','شركة سلامة للتأمين'];
function opts(arr,v){return arr.map(x=>'<option '+(x===v?'selected':'')+'>'+e(x)+'</option>').join('');}
function openForm(i){
 const c=(i!=null)?CARS[i]:{brand:'',model:'',year:'',color:'أبيض',plate:'',reg:'خاص',serial:'',hid:'1018492759',license_exp:'',inspection_exp:'',ins_co:'',ins_start:'',ins_exp:'',ins_status:'سارية'};
 const F=(l,id,v,ph)=>'<div class="field"><label>'+l+'</label><input id="f_'+id+'" value="'+e(v)+'" placeholder="'+(ph||'')+'"></div>';
 g('modalIn').innerHTML=
 '<div class="modal-head"><h2>'+(i!=null?'✎ تعديل مركبة':'+ إضافة مركبة')+'</h2><button class="x" onclick="closeModal()">×</button></div>'+
 '<div class="grid2">'+
  '<div class="field"><label>الماركة</label><input id="f_brand" list="brandlist" value="'+e(c.brand)+'"><datalist id="brandlist">'+brands().map(b=>'<option>'+e(b)+'</option>').join('')+'</datalist></div>'+
  F('الموديل','model',c.model)+
  F('سنة الصنع','year',c.year)+
  '<div class="field"><label>اللون</label><select id="f_color">'+opts(COLORS,c.color)+'</select></div>'+
  F('رقم اللوحة','plate',c.plate,'أ ب ج 1234')+
  '<div class="field"><label>نوع التسجيل</label><select id="f_reg">'+opts(REGS,c.reg)+'</select></div>'+
  F('الرقم التسلسلي','serial',c.serial)+
  F('رقم الهوية','hid',c.hid)+
  F('انتهاء رخصة السير (هجري)','license_exp',c.license_exp,'1450-03-30')+
  F('انتهاء الفحص الدوري (هجري)','inspection_exp',c.inspection_exp,'1448-06-26')+
  '<div class="field"><label>شركة التأمين</label><input id="f_ins_co" list="inslist" value="'+e(c.ins_co)+'"><datalist id="inslist">'+INSCOS.map(x=>'<option>'+e(x)+'</option>').join('')+'</datalist></div>'+
  '<div class="field"><label>حالة التأمين</label><select id="f_ins_status">'+opts(['سارية','منتهية'],c.ins_status)+'</select></div>'+
  F('بداية التأمين (هجري)','ins_start',c.ins_start)+
  F('انتهاء التأمين (هجري)','ins_exp',c.ins_exp)+
 '</div>'+
 '<div class="actions"><button class="btn gold" onclick="saveForm('+(i!=null?i:-1)+')">💾 حفظ</button><button class="btn" onclick="'+(i!=null?'openDetail('+i+')':'closeModal()')+'">إلغاء</button></div>';
 g('modal').classList.add('open');
}
function saveForm(i){
 const val=id=>{const el=g('f_'+id);return el?el.value.trim():'';};
 const o={brand:val('brand'),model:val('model'),year:val('year'),color:val('color'),plate:val('plate'),reg:val('reg'),serial:val('serial'),hid:val('hid'),license_exp:val('license_exp'),inspection_exp:val('inspection_exp'),ins_co:val('ins_co'),ins_start:val('ins_start'),ins_exp:val('ins_exp'),ins_status:val('ins_status')};
 if(!o.brand||!o.plate){alert('الماركة ورقم اللوحة مطلوبان');return;}
 if(i>=0){Object.assign(CARS[i],o);save();openDetail(i);}
 else{o.id=String(Date.now());o.form='';CARS.push(o);save();closeModal();}
 render();
}
function exportXls(){
 const H=['الماركة','الموديل','السنة','اللون','رقم اللوحة','التسجيل','الرقم التسلسلي','انتهاء الرخصة','انتهاء الفحص','شركة التأمين','بداية التأمين','انتهاء التأمين','حالة التأمين','التنبيهات'];
 const rows=CARS.map(c=>[c.brand,c.model,c.year,c.color,c.plate,c.reg,c.serial,fd(c.license_exp),fd(c.inspection_exp),c.ins_co,fd(c.ins_start),fd(c.ins_exp),c.ins_status,carAlerts(c).join(' / ')]);
 let t=H.join('\t')+'\n'+rows.map(r=>r.map(x=>x==null?'':x).join('\t')).join('\n');
 const b=new Blob(['﻿'+t],{type:'application/vnd.ms-excel;charset=utf-8'});
 const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='سجل_السيارات.xls';a.click();
}
g('q').oninput=render;g('fb').onchange=render;g('fs').onchange=render;
g('modal').addEventListener('click',ev=>{if(ev.target===g('modal'))closeModal();});
updateCalBtn();render();
</script></body></html>
