*{box-sizing:border-box}

.wrap{max-width:1100px;margin:0 auto}

.crest{width:52px;height:52px;border-radius:14px;background:linear-gradient(160deg,#1a3325,#0c1c13);border:1px solid var(--gold);display:flex;align-items:center;justify-content:center;font-size:24px}

.stat{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:8px 16px;text-align:center}
.stat b{display:block;font-size:20px;color:var(--gold2)}
.stat span{font-size:11px;color:var(--muted)}
.searchbox{position:relative;margin-bottom:14px}
#q{width:100%;background:var(--panel);color:var(--cream);border:1px solid var(--gold);border-radius:12px;padding:14px 46px 14px 16px;font-size:16px;font-family:inherit}
#q:focus{outline:none;border-color:var(--gold2);box-shadow:0 0 0 3px rgba(184,146,26,.15)}
.searchbox .ic{position:absolute;right:16px;top:50%;transform:translateY(-50%);font-size:18px;color:var(--gold2)}
.tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.tab{background:var(--panel);border:1px solid var(--line);color:var(--muted);border-radius:10px;padding:9px 16px;font-size:13.5px;cursor:pointer;font-family:inherit;transition:.15s}
.tab:hover{border-color:var(--gold)}
.tab.on{background:linear-gradient(160deg,var(--gold),#8a6d14);color:#1a1205;border-color:var(--gold2);font-weight:700}
.tab .n{opacity:.75;font-size:11.5px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:12px}
.card{background:linear-gradient(165deg,var(--panel),var(--panel2));border:1px solid var(--line);border-radius:14px;padding:14px 16px;transition:.15s}
.card:hover{border-color:var(--gold)}
.card h3{margin:0 0 8px;font-size:16px;color:var(--gold2);font-weight:700}
.card .d{font-size:13.5px;line-height:1.75;margin-bottom:10px}
.card .n{font-size:12.5px;line-height:1.7;background:#12241a;border-right:3px solid var(--gold);border-radius:0 8px 8px 0;padding:8px 10px;color:#cfe0d4}
.card .steps{margin-top:10px;background:#0d2416;border:1px solid var(--line);border-radius:10px;padding:9px 12px}
.card .steps b{display:block;font-size:11.5px;color:var(--gold2);margin-bottom:6px;letter-spacing:.3px}
.card .steps ol{margin:0;padding-inline-start:18px}
.card .steps li{font-size:12.5px;line-height:1.75;margin-bottom:3px}
.card .fee{margin-top:9px;font-size:12.5px;line-height:1.7;background:#1d1708;border:1px solid var(--gold);border-radius:10px;padding:8px 11px;color:#f0e2b8}
.card .fee b{color:var(--gold2)}
.opts{display:flex;align-items:center;gap:7px;margin:-4px 0 14px;font-size:12.5px;color:var(--muted);cursor:pointer;user-select:none}
.opts input{accent-color:var(--gold);width:15px;height:15px;cursor:pointer}
.card .g{display:inline-block;margin-top:10px;font-size:11px;background:#0a2010;border:1px solid var(--line);color:var(--muted);border-radius:20px;padding:3px 10px}
.card .cat{float:left;font-size:10.5px;background:#0a2010;border:1px solid var(--gold);color:var(--gold2);border-radius:20px;padding:2px 9px}
.empty{text-align:center;color:var(--muted);padding:40px;font-size:14px}
mark{background:rgba(216,180,65,.35);color:#fff;border-radius:3px;padding:0 2px}
footer{text-align:center;color:#6f8578;font-size:11.5px;margin-top:22px;border-top:1px solid var(--line);padding-top:12px}
@media print{*{background:transparent!important;color:#000!important;-webkit-print-color-adjust:exact!important}body{background:#fff!important}.tabs,.searchbox,header .stat{display:none!important}.card{border:1px solid #999!important;break-inside:avoid}.grid{grid-template-columns:1fr 1fr}}

function e(s){return String(s==null?"":s).replace(/[&<>"]/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c];});}
function hl(s,q){ if(!q) return e(s); var r=new RegExp("("+q.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")+")","gi"); return e(s).replace(r,"<mark>$1</mark>"); }
function tabs(){
 document.getElementById("tabs").innerHTML=CATS.map(function(c){
  var n=c.k?DATA.filter(function(x){return x.c===c.k;}).length:DATA.length;
  return '<button class="tab'+(cur===c.k?' on':'')+'" onclick="setCat(\''+c.k+'\')">'+c.n+' <span class="n">('+n+')</span></button>';
 }).join("");
}
function setCat(k){cur=k;tabs();render();}
function render(){
 var q=(document.getElementById("q").value||"").trim();
 var op=document.getElementById("onlyp").checked;
 var list=DATA.filter(function(x){
  if(cur && x.c!==cur) return false;
  if(op && !((x.p&&x.p.length)||x.f)) return false;
  if(!q) return true;
  return (x.t+" "+x.d+" "+x.n+" "+x.g+" "+(x.p||[]).join(" ")+" "+(x.f||"")).indexOf(q)>=0;
 });
 document.getElementById("tot").textContent=list.length;
 document.getElementById("empty").style.display=list.length?"none":"block";
 document.getElementById("grid").innerHTML=list.map(function(x){
  return '<div class="card"><span class="cat">'+e(x.c)+'</span><h3>'+hl(x.t,q)+'</h3>'
   +'<div class="d">'+hl(x.d,q)+'</div>'
   +'<div class="n">💡 '+hl(x.n,q)+'</div>'
   +((x.p&&x.p.length)?'<div class="steps"><b>الإجراءات المتبعة</b><ol>'+x.p.map(function(s){return '<li>'+hl(s,q)+'</li>';}).join('')+'</ol></div>':'')
   +(x.f?'<div class="fee"><b>التكلفة:</b> '+hl(x.f,q)+'</div>':'')
   +'<span class="g">🏛 '+e(x.g)+'</span></div>';
 }).join("");
}
document.getElementById("q").oninput=render;
document.getElementById("onlyp").onchange=render;
tabs();render();
</script></body></html>
